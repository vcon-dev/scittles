services:
  scittles:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scittles
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      # Core Configuration
      - SCITT_DB_PATH=/app/data/transparency.db
      - SCITT_HOST=0.0.0.0
      - SCITT_PORT=8000
      - SCITT_SERVICE_URL=${SCITT_SERVICE_URL:-https://transparency.example}
      
      # Observability Configuration
      - SCITT_LOG_LEVEL=${SCITT_LOG_LEVEL:-INFO}
      - SCITT_LOG_FORMAT=${SCITT_LOG_FORMAT:-json}
      - SCITT_OTEL_ENABLED=${SCITT_OTEL_ENABLED:-true}
      - SCITT_OTEL_SERVICE_NAME=${SCITT_OTEL_SERVICE_NAME:-scittles}
      - SCITT_OTEL_EXPORTER=${SCITT_OTEL_EXPORTER:-prometheus,console}
      - SCITT_OTEL_ENDPOINT=${SCITT_OTEL_ENDPOINT:-}
      - SCITT_OTEL_HEADERS=${SCITT_OTEL_HEADERS:-}
      - SCITT_PROMETHEUS_PORT=${SCITT_PROMETHEUS_PORT:-9090}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/.well-known/transparency-configuration').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

